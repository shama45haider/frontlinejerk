<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frontline Jerk - Coming Soon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0d3b0d, #000);
  color: white;
  overflow: hidden;
}

/* CENTER CONTENT */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}

/* LOGO GLOW */
.logo {
  width: 320px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px #ff4500);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* GLOW BACKGROUND */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255,140,0,0.6), transparent);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: pulseGlow 3s infinite;
}

@keyframes pulseGlow {
  0% { transform: translate(-50%, -50%) scale(1); opacity: .7; }
  50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: .7; }
}

/* TITLE */
h1 {
  font-size: 60px;
  background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
  -webkit-background-clip: text;
  color: transparent;
}

/* COUNTDOWN */
.countdown {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.box {
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(255,200,0,0.4);
}

.box span {
  font-size: 30px;
}

/* FIRE BASE */
.fire {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: radial-gradient(circle, #ff4500, transparent);
  animation: fireMove 0.2s infinite alternate;
}

@keyframes fireMove {
  from { transform: scaleY(1); }
  to { transform: scaleY(1.1); }
}

/* PARTICLES */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: orange;
  border-radius: 50%;
  animation: rise 5s linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
  <img src="frontlinejerktransparent.png" class="logo">

  <h1>Coming Soon</h1>

  <p>Get ready for a full serving of Jamaican flavors 🔥</p>

  <div class="countdown">
    <div class="box"><span id="days">00</span><br>Days</div>
    <div class="box"><span id="hours">00</span><br>Hours</div>
    <div class="box"><span id="minutes">00</span><br>Minutes</div>
    <div class="box"><span id="seconds">00</span><br>Seconds</div>
  </div>
</div>

<div class="fire"></div>

<script>
// COUNTDOWN
const launch = new Date("2026-06-01").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = launch - now;

  document.getElementById("days").innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((diff/(1000*60*60))%24);
  document.getElementById("minutes").innerText = Math.floor((diff/1000/60)%60);
  document.getElementById("seconds").innerText = Math.floor((diff/1000)%60);
},1000);

// PARTICLES
for(let i=0;i<40;i++){
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random()*100 + "vw";
  p.style.animationDuration = (Math.random()*3+2)+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
