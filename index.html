<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontline Jerk</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url('./background.png');
  background-size: cover;
  background-position: center;
  z-index: -2;
}

/* CENTER */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 🔥 BIGGER LOGO */
.logo {
  width: 420px;          /* 🔥 BIGGER */
  max-width: 90vw;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* 🔥 NOW OPEN (UPGRADED) */
h1 {
  margin-top: 25px;
  font-size: 70px;
  font-weight: bold;

  /* Jamaican gradient */
  background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
  -webkit-background-clip: text;
  color: transparent;

  animation: glowPulse 1.5s infinite alternate, bounce 2s infinite;
}

/* GLOW EFFECT */
@keyframes glowPulse {
  from {
    filter: drop-shadow(0 0 10px orange);
  }
  to {
    filter: drop-shadow(0 0 35px red);
  }
}

/* SUBTLE BOUNCE */
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* FIRE (SUBTLE) */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: linear-gradient(to top, rgba(255,80,0,0.3), transparent);
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {
  .logo {
    width: 260px;
  }

  h1 {
    font-size: 42px;
  }
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="container">
  <img src="./logo.png" class="logo" alt="Frontline Logo">
  <h1>Now Open</h1>
</div>

<div class="fire"></div>

</body>
</html>
