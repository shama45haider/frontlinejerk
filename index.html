<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frontline Jerk - Coming Soon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: radial-gradient(circle at center, #0a3d0a, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* LOGO */
.logo {
  width: 300px;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: scale(1); filter: drop-shadow(0 0 10px #ff3c00);}
  50% { transform: scale(1.05); filter: drop-shadow(0 0 25px #ffcc00);}
  100% { transform: scale(1); filter: drop-shadow(0 0 10px #ff3c00);}
}

/* TITLE */
h1 {
  font-size: 60px;
  margin-top: 10px;
  background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
  -webkit-background-clip: text;
  color: transparent;
}

/* SUBTEXT */
p {
  font-size: 18px;
  color: #ddd;
}

/* COUNTDOWN */
.countdown {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
}

.box {
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(255,200,0,0.5);
}

.box span {
  font-size: 30px;
  display: block;
}

/* EMAIL */
.input-container {
  margin-top: 20px;
}

input {
  padding: 15px;
  width: 250px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 25px;
  background: linear-gradient(to right, #ff0000, #ffcc00);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
}

/* FLOATING FOOD EFFECT */
.floating {
  position: absolute;
  width: 60px;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0;}
  50% { opacity: 1;}
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0;}
}

/* FLAME EFFECT */
.flames {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 150px;
  background: radial-gradient(circle, rgba(255,80,0,0.8), transparent);
  animation: flicker 0.2s infinite;
}

@keyframes flicker {
  0% { opacity: 0.8; }
  50% { opacity: 1; }
  100% { opacity: 0.8; }
}

</style>
</head>

<body>

<!-- FLOATING ITEMS -->
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" class="floating" style="left:10%; animation-delay:0s;">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" class="floating" style="left:80%; animation-delay:3s;">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" class="floating" style="left:50%; animation-delay:6s;">

<!-- LOGO -->
<img src="frontlinejerktransparent.png" class="logo">

<h1>Coming Soon</h1>

<p>Our new website is under construction.<br>
Get ready for a full serving of Jamaican flavors 🔥</p>

<!-- COUNTDOWN -->
<div class="countdown">
  <div class="box"><span id="days">00</span>Days</div>
  <div class="box"><span id="hours">00</span>Hours</div>
  <div class="box"><span id="minutes">00</span>Minutes</div>
  <div class="box"><span id="seconds">00</span>Seconds</div>
</div>

<!-- EMAIL -->
<div class="input-container">
  <input type="email" placeholder="Enter your email">
  <button>Notify Me</button>
</div>

<!-- FLAMES -->
<div class="flames"></div>

<script>
// SET YOUR LAUNCH DATE HERE
const launchDate = new Date("2026-06-01 00:00:00").getTime();

const timer = setInterval(function() {
  const now = new Date().getTime();
  const distance = launchDate - now;

  document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
  document.getElementById("hours").innerHTML = Math.floor((distance / (1000 * 60 * 60)) % 24);
  document.getElementById("minutes").innerHTML = Math.floor((distance / 1000 / 60) % 60);
  document.getElementById("seconds").innerHTML = Math.floor((distance / 1000) % 60);

  if (distance < 0) {
    clearInterval(timer);
    document.querySelector(".countdown").innerHTML = "WE ARE LIVE 🔥";
  }
}, 1000);
</script>

</body>
</html>
