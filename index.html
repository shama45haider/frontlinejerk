<!DOCTYPE html>
<html>
<head>
<title>Frontline Jerk</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* BACKGROUND (YOUR IMAGE) */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("background.png") center/cover no-repeat;
  z-index: -2;
}

/* GLOW PULSE */
.glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,120,0,0.2), transparent);
  animation: pulse 4s infinite alternate;
}

@keyframes pulse {
  from { opacity: 0.6; }
  to { opacity: 1; }
}

/* FIRE FLICKER */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: radial-gradient(circle, rgba(255,80,0,0.8), transparent);
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { opacity: 0.7; }
  to { opacity: 1; }
}

/* EMBERS */
.ember {
  position: absolute;
  width: 5px;
  height: 5px;
  background: orange;
  border-radius: 50%;
  box-shadow: 0 0 10px orange;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  40% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* MOUSE GLOW */
.cursor {
  position: fixed;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255,150,0,0.4), transparent);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="fire"></div>
<div class="cursor" id="cursor"></div>

<script>

/* EMBERS */
for(let i=0;i<120;i++){
  let e = document.createElement("div");
  e.className = "ember";
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (Math.random()*4+2) + "s";
  document.body.appendChild(e);
}

/* CURSOR GLOW */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

</script>

</body>
</html>
