<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontline Jerk</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* 🌴 BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("./background.png") center/cover no-repeat;
  z-index: -2;
}

/* 🌑 SHADE */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
  z-index: -1;
}

/* CENTER */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 🔥 BIGGER LOGO */
.logo {
  width: 500px;   /* 🔥 increased */
  max-width: 90vw;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 🔥 NOW OPEN (REDUCED GLOW) */
.now-open {
  margin-top: 20px;
  font-size: 70px;
  font-weight: 900;
  letter-spacing: 2px;

  background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
  -webkit-background-clip: text;
  color: transparent;

  text-shadow:
    0 0 5px rgba(255,200,0,0.6),
    0 0 10px rgba(255,150,0,0.7),
    0 0 20px rgba(255,100,0,0.8);
}

/* SUBTEXT */
.subtext {
  margin-top: 15px;
  font-size: 18px;
  color: #eee;
}

/* INSTAGRAM SECTION */
.social {
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #ffcc00;
}

/* 🔥 FIRE */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: linear-gradient(to top, rgba(255,80,0,0.3), transparent);
}

/* ✨ EMBERS */
.ember {
  position: absolute;
  width: 4px;
  height: 4px;
  background: orange;
  border-radius: 50%;
  box-shadow: 0 0 8px orange;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  40% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  .logo {
    width: 280px;
  }

  .now-open {
    font-size: 40px;
  }
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <img src="./logo.png" class="logo" alt="Frontline Logo">

  <h1 class="now-open">Now Open</h1>

  <p class="subtext">Stay Updated Through our Socials</p>

  <div class="social">📸 @frontlinejerk</div>
</div>

<div class="fire"></div>

<script>
/* EMBERS */
for(let i=0;i<80;i++){
  let e = document.createElement("div");
  e.className = "ember";
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (Math.random()*3+2) + "s";
  document.body.appendChild(e);
}
</script>

</body>
</html>
