<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontline Jerk</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* 🌴 BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("./background.png") center/cover no-repeat;
  z-index: -2;
}

/* 🌑 SHADE OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
  z-index: -1;
}

/* CENTER */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 🔥 LOGO */
.logo {
  width: 420px;
  max-width: 90vw;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* 🔥 NOW OPEN TEXT */
.now-open {
  margin-top: 25px;
  font-size: 75px;
  font-weight: 900;
  letter-spacing: 2px;
  position: relative;

  background: linear-gradient(
    90deg,
    #00ff00,
    #ffff00,
    #ff0000,
    #ffff00,
    #00ff00
  );
  background-size: 300%;
  -webkit-background-clip: text;
  color: transparent;

  animation:
    gradientMove 3s linear infinite,
    glowPulse 1.2s infinite alternate,
    pop 2s ease-in-out infinite;
}

/* 🌈 GRADIENT MOVE */
@keyframes gradientMove {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* 🔥 GLOW */
@keyframes glowPulse {
  from { filter: drop-shadow(0 0 10px orange); }
  to { filter: drop-shadow(0 0 40px red); }
}

/* 💥 POP */
@keyframes pop {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* ✨ SHIMMER */
.now-open::after {
  content: "Now Open";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  color: transparent;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.9),
    transparent
  );

  -webkit-background-clip: text;

  animation: shine 2s infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* 🔥 FIRE BASE */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: linear-gradient(to top, rgba(255,80,0,0.3), transparent);
  animation: flicker 0.3s infinite alternate;
}

@keyframes flicker {
  from { opacity: 0.5; }
  to { opacity: 0.8; }
}

/* ✨ EMBERS */
.ember {
  position: absolute;
  width: 4px;
  height: 4px;
  background: orange;
  border-radius: 50%;
  box-shadow: 0 0 8px orange;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  40% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  .logo {
    width: 260px;
  }

  .now-open {
    font-size: 42px;
  }
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <img src="./logo.png" class="logo" alt="Frontline Logo">
  <h1 class="now-open">Now Open</h1>
</div>

<div class="fire"></div>

<script>
/* 🔥 EMBERS */
for(let i=0;i<80;i++){
  let e = document.createElement("div");
  e.className = "ember";
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (Math.random()*3+2) + "s";
  document.body.appendChild(e);
}
</script>

</body>
</html>
