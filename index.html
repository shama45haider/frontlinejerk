<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontline Jerk</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* 🌴 BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("background.png") center/cover no-repeat;
  z-index: -2;
}

/* DARK OVERLAY FOR READABILITY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0.2));
  z-index: -1;
}

/* CENTER CONTENT */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 🖼️ LOGO */
.logo {
  width: 280px;
  max-width: 80vw;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 🔥 NOW OPEN TEXT */
h1 {
  margin-top: 20px;
  font-size: 64px;
  color: #ffcc00;
  text-shadow: 0 0 20px orange;
  animation: glow 1.5s infinite alternate;
}

/* TEXT ANIMATION */
@keyframes glow {
  from {
    text-shadow: 0 0 10px orange;
    transform: scale(1);
  }
  to {
    text-shadow: 0 0 35px red;
    transform: scale(1.05);
  }
}

/* 🔥 FIRE BASE (SUBTLE) */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 100px;
  background: linear-gradient(to top, rgba(255,80,0,0.4), transparent);
  animation: flicker 0.3s infinite alternate;
}

@keyframes flicker {
  from { opacity: 0.5; }
  to { opacity: 0.8; }
}

/* ✨ EMBERS */
.ember {
  position: absolute;
  width: 4px;
  height: 4px;
  background: orange;
  border-radius: 50%;
  box-shadow: 0 0 8px orange;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  40% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 📱 MOBILE ADJUSTMENTS */
@media (max-width: 768px) {
  h1 {
    font-size: 40px;
  }

  .logo {
    width: 220px;
  }
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <img src="logo.png" class="logo">
  <h1>Now Open</h1>
</div>

<div class="fire"></div>

<script>

/* EMBERS */
for(let i=0;i<80;i++){
  let e = document.createElement("div");
  e.className = "ember";
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (Math.random()*3+2) + "s";
  document.body.appendChild(e);
}

</script>

</body>
</html>
